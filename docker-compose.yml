services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-causaops}
      POSTGRES_USER: ${POSTGRES_USER:-causaops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-causaops_local}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://causaops:causaops_local@db:5432/causaops}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_TEST_MODEL: ${GROQ_TEST_MODEL:-openai/gpt-oss-20b}
      GROQ_PRIMARY_MODEL: ${GROQ_PRIMARY_MODEL:-openai/gpt-oss-120b}
      GROQ_REASONING_EFFORT: ${GROQ_REASONING_EFFORT:-medium}
      GROQ_TIMEOUT_SECONDS: ${GROQ_TIMEOUT_SECONDS:-30}
      DIAGNOSIS_MAX_EVIDENCE: ${DIAGNOSIS_MAX_EVIDENCE:-30}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 10

  demo-service:
    build:
      context: ./apps/demo-service
    environment:
      CAUSAOPS_API_URL: http://api:8000
      STABLE_DELAY_SECONDS: ${STABLE_DELAY_SECONDS:-0.05}
      TIMEOUT_DELAY_SECONDS: ${TIMEOUT_DELAY_SECONDS:-2.5}
    ports:
      - "8100:8100"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  detector:
    build:
      context: ./apps/api
    command: ["python", "-m", "app.detect", "--loop"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://causaops:causaops_local@db:5432/causaops}
      DETECTION_WINDOW_MINUTES: ${DETECTION_WINDOW_MINUTES:-5}
      DETECTION_INTERVAL_SECONDS: ${DETECTION_INTERVAL_SECONDS:-30}
      MINIMUM_REQUEST_COUNT: ${MINIMUM_REQUEST_COUNT:-5}
      ERROR_RATE_THRESHOLD: ${ERROR_RATE_THRESHOLD:-0.10}
      LATENCY_P95_THRESHOLD_MS: ${LATENCY_P95_THRESHOLD_MS:-2000}
      HEALTH_CHECK_FAILURE_THRESHOLD: ${HEALTH_CHECK_FAILURE_THRESHOLD:-3}
      DEPLOYMENT_CORRELATION_MINUTES: ${DEPLOYMENT_CORRELATION_MINUTES:-15}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
      DEMO_INTERNAL_URL: ${DEMO_INTERNAL_URL:-http://demo-service:8100}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
      demo-service:
        condition: service_healthy

volumes:
  postgres_data:
